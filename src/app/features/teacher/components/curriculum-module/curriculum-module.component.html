<div class="overflow-hidden rounded-[24px] border border-[#dbe4ea] bg-white shadow-sm">
  <div
    class="flex cursor-pointer items-center justify-between gap-4 p-5 transition-colors hover:bg-slate-50"
    (click)="onToggleExpand()"
  >
    <div class="flex items-center gap-3">
      <div class="cursor-grab rounded-xl p-1 text-slate-300 transition-colors hover:text-slate-500 active:cursor-grabbing" title="Drag to reorder">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <path d="M8 6a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM8 12a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM8 18a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM14 6a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM14 12a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM14 18a2 2 0 1 1-4 0 2 2 0 0 1 4 0z"/>
        </svg>
      </div>

      <div>
        <span class="text-xs font-semibold uppercase tracking-[0.18em] text-[#23A997]">Chapter {{ moduleNumber }}</span>
        <h3 class="mt-1 font-semibold text-[#181F39]">{{ module.title }}</h3>
        <p *ngIf="module.description" class="mt-1 text-sm text-slate-500">
          {{ module.description }}
        </p>
      </div>
    </div>

    <div class="flex items-center gap-2">
      <div class="hidden items-center gap-2 sm:flex">
        <button
          (click)="onEditModule($event)"
          class="rounded-xl border border-[#23A997]/20 bg-white p-2 text-[#23A997] transition hover:border-[#23A997] hover:bg-[#ecf9f6]"
          title="Edit module"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
          </svg>
        </button>
        <button
          (click)="onDeleteModule($event)"
          class="rounded-xl border border-red-200 bg-white p-2 text-red-500 transition hover:bg-red-50 hover:text-red-600"
          title="Delete module"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
        </button>
      </div>

      <svg
        class="h-5 w-5 text-slate-400 transition-transform duration-200"
        [class.rotate-180]="module.isExpanded"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
      </svg>
    </div>
  </div>

  <div
    *ngIf="module.isExpanded"
    class="border-t border-[#edf2f7] bg-slate-50/70"
  >
    <div class="divide-y divide-[#e2e8f0]">
      <div
        *ngFor="let lesson of module.lessons; let i = index"
        draggable="true"
        (dragstart)="onDragStart($event, i)"
        (dragover)="onDragOver($event, i)"
        (drop)="onDrop($event, i)"
        (dragend)="onDragEnd()"
        class="cursor-move transition-all duration-200"
        [ngClass]="{
          'opacity-50': draggedLessonIndex === i,
          'bg-[#ecf9f6] border-t-2 border-[#23A997]': draggedLessonIndex !== null && draggedLessonIndex !== i
        }"
      >
        <app-lesson-item
          [lesson]="lesson"
          (edit)="onEditLesson(lesson)"
          (delete)="onDeleteLesson(lesson.id)"
        ></app-lesson-item>
      </div>
    </div>

    <div class="p-4">
      <button
        (click)="onAddLesson()"
        class="flex w-full items-center justify-center gap-2 rounded-2xl border-2 border-dashed border-[#23A997]/35 bg-white py-3 text-sm font-semibold text-slate-500 transition hover:border-[#23A997] hover:bg-[#ecf9f6] hover:text-[#23A997]"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        Add Lesson
      </button>
    </div>
  </div>
</div>
