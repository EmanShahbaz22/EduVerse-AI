<div class="bg-white">
  <div class="mx-auto max-w-7xl border-b border-[#e2e8f0] px-6">
    <nav class="flex space-x-8 overflow-x-auto" aria-label="Tabs">
    <button
      *ngFor="let tab of tabs"
      (click)="onTabClick(tab.id)"
      class="whitespace-nowrap border-b-2 px-3 py-3 text-[15px] font-medium transition-colors"
      [ngClass]="{
        'border-[#23A997] text-[#23A997]': activeTab === tab.id,
        'border-transparent text-[#64748b] hover:text-[#181F39] hover:border-[#e2e8f0]': activeTab !== tab.id
      }"
    >
      {{ tab.label }}
    </button>
    </nav>
  </div>
</div>
