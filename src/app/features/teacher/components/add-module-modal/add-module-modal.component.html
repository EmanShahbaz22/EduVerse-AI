<div
  class="fixed inset-0 z-[100] flex items-center justify-center bg-black/30 p-6 backdrop-blur-[2px]"
  (click)="onOverlayClick($event)"
>
  <div
    class="w-full max-w-lg overflow-hidden rounded-[24px] border border-[#e2e8f0] bg-white shadow-2xl"
    (click)="$event.stopPropagation()"
  >
    <!-- Header -->
    <div class="flex items-center justify-between border-b border-[#e2e8f0] px-6 py-5">
      <h2 class="text-xl font-bold text-[#181F39]">
        {{ isEditMode ? 'Edit Chapter' : 'Add Chapter' }}
      </h2>
      <button
        type="button"
        class="text-gray-400 transition-colors hover:text-gray-600"
        (click)="onClose()"
      >
        <i class="fa-solid fa-xmark text-lg"></i>
      </button>
    </div>

    <!-- Body -->
    <div class="p-6 space-y-4">
      <!-- Chapter Title -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Chapter Title <span class="text-red-500">*</span>
        </label>
        <input
          type="text"
          [(ngModel)]="title"
          class="w-full rounded-xl border border-[#e2e8f0] px-4 py-3 focus:border-[#23A997] focus:outline-none focus:ring-1 focus:ring-[#23A997]"
          placeholder="e.g., Introduction to Design Tokens"
          [class.border-red-500]="title.length > 0 && title.length < 3"
        />
        <p *ngIf="title.length > 0 && title.length < 3" class="mt-1 text-xs text-red-500">
          Title must be at least 3 characters
        </p>
      </div>

      <!-- Chapter Description -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Description (Optional)
        </label>
        <textarea
          [(ngModel)]="description"
          rows="3"
          class="w-full resize-none rounded-xl border border-[#e2e8f0] px-4 py-3 focus:border-[#23A997] focus:outline-none focus:ring-1 focus:ring-[#23A997]"
          placeholder="Describe what students will learn in this chapter..."
        ></textarea>
      </div>
    </div>

    <!-- Footer -->
    <div class="flex justify-end gap-3 border-t border-[#e2e8f0] bg-slate-50 px-6 py-4">
      <button
        type="button"
        class="rounded-[12px] border border-[#23A997]/30 bg-white px-6 py-2.5 font-semibold text-[#23A997] transition hover:border-[#23A997] hover:bg-[#23A997]/5"
        (click)="onClose()"
      >
        Cancel
      </button>
      <button
        type="button"
        [disabled]="!isValid"
        class="rounded-[12px] bg-[#23A997] px-8 py-2.5 font-semibold text-white shadow-[0_4px_12px_rgba(35,169,151,0.2)] transition hover:bg-[#1f9686] disabled:cursor-not-allowed disabled:bg-[#23A997]/50"
        (click)="onSave()"
      >
        {{ isEditMode ? 'Update Chapter' : 'Add Chapter' }}
      </button>
    </div>
  </div>
</div>
