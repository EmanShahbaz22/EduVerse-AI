<div
  class="fixed inset-0 z-[100] flex items-center justify-center bg-black/30 p-6 backdrop-blur-[2px]"
  (click)="onOverlayClick($event)"
>
  <div
    class="flex max-h-[90vh] w-full max-w-lg flex-col overflow-hidden rounded-[24px] border border-[#e2e8f0] bg-white shadow-2xl"
    (click)="$event.stopPropagation()"
  >
    <!-- Header -->
    <div class="flex flex-shrink-0 items-center justify-between border-b border-[#e2e8f0] px-6 py-5">
      <h2 class="text-xl font-bold text-[#181F39]">
        {{ isEditMode ? 'Edit Lesson' : 'Add Lesson' }}
      </h2>
      <button
        type="button"
        class="text-gray-400 transition-colors hover:text-gray-600"
        (click)="onClose()"
      >
        <i class="fa-solid fa-xmark text-lg"></i>
      </button>
    </div>

    <!-- Body -->
    <div class="p-6 space-y-4 overflow-y-auto flex-1">
      <!-- Lesson Name -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Lesson Name <span class="text-red-500">*</span>
        </label>
        <input
          type="text"
          [(ngModel)]="title"
          class="w-full rounded-xl border border-[#e2e8f0] px-4 py-3 focus:border-[#23A997] focus:outline-none focus:ring-1 focus:ring-[#23A997]"
          placeholder="e.g., Introduction to Photosynthesis"
          [class.border-red-500]="title.length > 0 && title.length < 3"
        />
        <p *ngIf="title.length > 0 && title.length < 3" class="mt-1 text-xs text-red-500">
          Name must be at least 3 characters
        </p>
      </div>

      <!-- Lesson Description / Content -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Lesson Description <span class="text-red-500">*</span>
        </label>
        <textarea
          [(ngModel)]="content"
          rows="10"
          class="w-full resize-none rounded-xl border border-[#e2e8f0] px-4 py-3 text-sm focus:border-[#23A997] focus:outline-none focus:ring-1 focus:ring-[#23A997]"
          placeholder="Describe the lesson content or provide the full text here..."
          [class.border-red-500]="content.length > 0 && content.length < 10"
        ></textarea>
        <p *ngIf="content.length > 0 && content.length < 10" class="mt-1 text-xs text-red-500">
          Description must be at least 10 characters
        </p>
        <p class="mt-1 text-xs text-gray-500">
          This description will be used as the basis for this lesson's content.
        </p>
      </div>
    </div>

    <!-- Footer -->
    <div class="flex flex-shrink-0 justify-end gap-3 border-t border-[#e2e8f0] bg-slate-50 px-6 py-4">
      <button
        type="button"
        class="rounded-[12px] border border-[#23A997]/30 bg-white px-6 py-2.5 font-semibold text-[#23A997] transition hover:border-[#23A997] hover:bg-[#23A997]/5"
        (click)="onClose()"
      >
        Cancel
      </button>
      <button
        type="button"
        [disabled]="!isValid"
        class="rounded-[12px] bg-[#23A997] px-8 py-2.5 font-semibold text-white shadow-[0_4px_12px_rgba(35,169,151,0.2)] transition hover:bg-[#1f9686] disabled:cursor-not-allowed disabled:bg-[#23A997]/50"
        (click)="onSave()"
      >
        {{ isEditMode ? 'Update Lesson' : 'Add Lesson' }}
      </button>
    </div>
  </div>
</div>
