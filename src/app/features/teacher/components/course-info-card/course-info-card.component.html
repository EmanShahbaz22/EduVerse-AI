<div class="rounded-[28px] border border-[#dbe4ea] bg-white p-6 shadow-sm">
  <div class="flex items-start justify-between gap-4">
    <div class="flex-1">
      <span class="text-xs font-semibold uppercase tracking-[0.22em] text-[#23A997]">
        Current Course
      </span>

      <h2 class="mt-2 text-2xl font-bold tracking-tight text-[#181F39]">
        {{ course.title || 'Untitled Course' }}
      </h2>

      <div class="mt-3 flex flex-wrap items-center gap-2 text-xs font-semibold">
        <span class="rounded-full bg-slate-100 px-3 py-1 text-slate-600">
          {{ moduleCount }} Modules
        </span>
        <span class="rounded-full bg-slate-100 px-3 py-1 text-slate-600">
          {{ lessonCount }} Lessons
        </span>
        <span *ngIf="course.totalDuration && course.totalDuration !== '0m'">
          <span class="inline-flex items-center rounded-full bg-[#ecf9f6] px-3 py-1 text-[#1b8c7d]">
            <svg class="mr-1 h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            {{ course.totalDuration }}
          </span>
        </span>
      </div>
    </div>

    <button
      (click)="onEditClick()"
      class="rounded-2xl border border-[#23A997]/25 bg-white p-3 text-[#23A997] transition hover:border-[#23A997] hover:bg-[#ecf9f6]"
      title="Edit course info"
    >
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
      </svg>
    </button>
  </div>

  <div class="mt-5 flex flex-wrap items-center gap-3">
    <span
      class="inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold"
      [ngClass]="{
        'bg-emerald-100 text-emerald-700': course.status === 'published',
        'bg-amber-100 text-amber-700': course.status === 'draft'
      }"
    >
      {{ course.status === 'published' ? 'Published' : 'Draft' }}
    </span>
    <span
      class="inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold"
      [ngClass]="{
        'bg-[#ecf9f6] text-[#1b8c7d]': course.isFree,
        'bg-slate-100 text-slate-600': !course.isFree
      }"
    >
      {{ course.isFree ? 'Free' : (course.price ? (course.currency || '$') + ' ' + course.price : 'Paid') }}
    </span>
  </div>
</div>
