<div class="flex min-h-screen flex-col animate-fade-in">
  <app-header pageTitle="Teacher Dashboard"></app-header>

  <main class="p-6">
    <div class="mx-auto flex max-w-7xl flex-col gap-6">
      <section class="grid grid-cols-1 gap-6 sm:grid-cols-2">
        <app-stat-card
          *ngFor="let s of statsCards"
          [title]="s.title"
          [value]="s.value"
          [icon]="s.icon"
          [iconBgClass]="s.iconBgClass"
          [iconColorClass]="s.iconColorClass">
        </app-stat-card>
      </section>

      <section class="grid grid-cols-1 gap-6 xl:grid-cols-[minmax(0,1.8fr)_minmax(320px,1fr)] xl:items-stretch">
        <app-data-table
          title="My Courses"
          [columns]="courseColumns"
          viewAllRoute="/teacher/courses"
          [rows]="courses"
          [showViewAll]="true"
          (actionClick)="onViewCourse($event)"
          (viewAllClick)="onViewAllCourses()">
        </app-data-table>

        <div class="flex h-full min-h-[320px] flex-col rounded-[28px] border border-[#dbe4ea] bg-white p-6 shadow-sm">
          <div class="mb-6 flex items-start justify-between gap-4">
            <div>
              <p class="text-sm font-semibold text-[#181F39]">Enrollment Overview</p>
              <p class="mt-1 text-sm text-slate-500">Student enrollments across your active subjects.</p>
            </div>
            <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-[#ecf9f6] text-[#23A997]">
              <i class="fas fa-chart-column text-lg"></i>
            </div>
          </div>

          <div class="relative flex min-h-[240px] flex-1 items-center justify-center">
            <app-student-enrollment-chart
              *ngIf="chartSubjects.length > 0; else noDataChart"
              [subjects]="chartSubjects"
              [enrollments]="chartEnrollments"
              class="h-full w-full">
            </app-student-enrollment-chart>
            <ng-template #noDataChart>
              <div class="flex flex-col items-center text-center text-slate-400">
                <i class="fas fa-chart-line mb-3 text-4xl"></i>
                <p class="text-sm font-medium text-slate-500">No enrollment data yet</p>
              </div>
            </ng-template>
          </div>
        </div>
      </section>
    </div>
  </main>
</div>
