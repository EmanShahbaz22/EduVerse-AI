<div class="flex min-h-screen flex-col animate-fade-in">
  <app-header pageTitle="Student Tracking"></app-header>

  <main class="p-6">
    <div class="mx-auto flex max-w-7xl flex-col gap-6">
      <app-filters
        [dropdowns]="dropdowns"
        [searchPlaceholder]="'Search students...'"
        (filtersChange)="onFiltersChange($event)">
      </app-filters>

      <section *ngIf="loading" class="rounded-[28px] border border-[#dbe4ea] bg-white px-6 py-16 text-center shadow-sm">
        <div class="mx-auto h-10 w-10 animate-spin rounded-full border-4 border-[#d8f1ec] border-t-[#23A997]"></div>
        <p class="mt-4 text-sm font-medium text-slate-600">Loading student performance...</p>
      </section>

      <section *ngIf="!loading && error" class="rounded-[24px] border border-red-200 bg-red-50 px-5 py-4 text-sm text-red-700 shadow-sm">
        <p class="font-semibold">Unable to load student tracking</p>
        <p class="mt-1">{{ error }}</p>
      </section>

      <section
        *ngIf="!loading && !error && students.length === 0"
        class="rounded-[28px] border border-dashed border-[#cbd5e1] bg-white px-6 py-16 text-center shadow-sm">
        <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-2xl bg-slate-100 text-slate-500">
          <i class="fas fa-user-graduate text-xl"></i>
        </div>
        <h3 class="mt-5 text-lg font-semibold text-[#181F39]">No students found</h3>
        <p class="mx-auto mt-2 max-w-md text-sm text-slate-500">
          Try adjusting the selected course or grade filter to see matching records.
        </p>
      </section>

      <app-data-table
        *ngIf="!loading && !error && students.length > 0"
        [title]="'Students'"
        [columns]="columns"
        [rows]="students"
        [rowClickable]="false"
        [pageSize]="pageSize"
        [currentPage]="currentPage"
        [totalItems]="totalItems"
        (actionClick)="onActionClick($event)"
        (pageChange)="currentPage = $event">
      </app-data-table>
    </div>
  </main>
</div>
