<div class="flex flex-col h-full animate-fade-in">
  <app-header pageTitle="Teachers"></app-header>

  <main class="p-6">
    <div class="mb-8">
      <app-filters [dropdowns]="[
          { key: 'status', label: 'Status', options: ['Active', 'Inactive'] }
        ]" searchPlaceholder="Search by name or email" (filtersChange)="onFiltersChange($event)">
        
        <div toolbar-actions>
          <app-button
            customColor="bg-[#23A997] hover:bg-[#1e9585] border border-transparent shadow-sm transition-all focus:ring-2 focus:ring-[#23A997]/50 cursor-pointer font-bold px-8 h-[46px] rounded-xl flex items-center justify-center gap-2 text-white ml-2"
            (buttonClick)="onAddTeacher()">
            <i class="fas fa-plus hidden md:inline-block"></i> Add Teacher
          </app-button>
        </div>
      </app-filters>
    </div>

    <app-data-table title="Manage Teachers" [columns]="teacherColumns" [rows]="filteredTeachers" [showViewAll]="false"
      [enableActions]="true" [rowClickable]="true" (edit)="onEditTeacher($event)" (delete)="onDeleteTeacher($event)"
      [totalItems]="filteredTeachers.length" [pageSize]="5" [currentPage]="currentPage"
      (pageChange)="onPageChange($event)" [highlightedRowId]="highlightedRowId">
    </app-data-table>
  </main>
</div>

<app-entity-modal [isOpen]="isModalOpen" [title]="modalTitle" [fields]="teacherFields" [initialData]="selectedTeacher"
  [isEditMode]="isEditMode" (close$)="onModalClose()" (submit$)="onModalSubmit($event)"></app-entity-modal>
