<div class="flex flex-col h-full">
  <app-header pageTitle="Settings"></app-header>
  <main class="p-6">
    <div class="max-w-6xl mx-auto">

      <!-- Sleek Tab Navigation -->
      <div class="border-b border-[#e2e8f0] mb-6">
        <nav class="flex space-x-8" aria-label="Tabs">
          <button
            class="px-3 py-2 text-[15px] font-medium border-b-2 transition-colors"
            [ngClass]="activeTab === 'profile' ? 'border-[#23A997] text-[#23A997]' : 'border-transparent text-[#64748b] hover:text-[#181F39] hover:border-[#e2e8f0]'"
            (click)="selectTab('profile')">
            Profile Settings
          </button>
          <button
            class="px-3 py-2 text-[15px] font-medium border-b-2 transition-colors"
            [ngClass]="activeTab === 'system' ? 'border-[#23A997] text-[#23A997]' : 'border-transparent text-[#64748b] hover:text-[#181F39] hover:border-[#e2e8f0]'"
            (click)="selectTab('system')">
            System Settings
          </button>
          <button
            class="px-3 py-2 text-[15px] font-medium border-b-2 transition-colors"
            [ngClass]="activeTab === 'billing' ? 'border-[#23A997] text-[#23A997]' : 'border-transparent text-[#64748b] hover:text-[#181F39] hover:border-[#e2e8f0]'"
            (click)="selectTab('billing')">
            Billing & Plans
          </button>
        </nav>
      </div>

      <div *ngIf="activeTab === 'profile'" class="grid grid-cols-1 lg:grid-cols-2 gap-6">

        <app-profile-form></app-profile-form>
        <app-change-password></app-change-password>
      </div>
      <div *ngIf="activeTab === 'system'" class="space-y-6">
        <app-system-settings></app-system-settings>
      </div>
      <div *ngIf="activeTab === 'billing'" class="space-y-6">
        <app-admin-billing [initialSuccessMessage]="billingFlashMessage"></app-admin-billing>
      </div>
    </div>
  </main>
</div>
