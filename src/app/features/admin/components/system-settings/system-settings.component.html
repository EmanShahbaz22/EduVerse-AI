<section class="bg-white rounded-[14px] shadow-sm border border-[#e2e8f0] p-8">
  <h2 class="text-2xl font-bold text-[#181F39] tracking-tight mb-6">System Settings</h2>

  <form (ngSubmit)="onSave()" class="space-y-6">
    
    <div *ngIf="isLoading" class="flex justify-center p-10">
      <i class="fa-solid fa-spinner animate-spin text-3xl text-[#23A997]"></i>
    </div>

    <ng-container *ngIf="!isLoading">
    <!-- Upload Logo -->
    <div>
      <label class="block text-[14px] font-medium text-[#181F39] mb-3"
        >Upload Logo</label
      >
      <div class="flex items-center space-x-4">
        <img
          [src]="logoPreview || 'assets/images/profile.png'"
          alt="System Logo"
          class="h-12 w-12 rounded-full border object-cover"
        />
        <label
          class="cursor-pointer bg-[#23A997] text-white px-5 py-2.5 rounded-xl shadow-md shadow-[#23A997]/20 hover:bg-[#1f9686] text-[14px] font-medium transition-all"
        >
          <i class="fas fa-upload mr-2"></i> Upload
          <input
            type="file"
            accept="image/*"
            (change)="onFileChange($event)"
            class="hidden"
          />
        </label>
      </div>
    </div>

    <!-- Organization Name -->
    <div>
      <label class="block text-[14px] font-medium text-[#181F39] mb-1.5"
        >Organization Name</label
      >
      <input
        type="text"
        name="tenantName"
        [(ngModel)]="tenantName"
        placeholder="Enter organization name"
        class="mt-1 block w-full h-[46px] rounded-xl border border-[#cbd5e1] bg-white px-4 text-[#181F39] text-[15px] focus:outline-none focus:ring-4 focus:ring-[#23A997]/20 focus:border-[#23A997] transition-all"
      />
    </div>

    <!-- ✅ Buttons Row -->
    <div class="pt-6 flex justify-end space-x-3">
      <!-- Save Button -->
      <app-button
        customColor="bg-[#23A997] text-white hover:bg-[#1f9686] transition-all shadow-md shadow-[#23A997]/20 rounded-xl font-medium"
        size="md"
        type="submit"
        [disabled]="isSaving"
      >
        <span *ngIf="!isSaving"><i class="fa-solid fa-floppy-disk mr-2"></i>Save Settings</span>
        <span *ngIf="isSaving"><i class="fa-solid fa-spinner animate-spin mr-2"></i> Saving...</span>
      </app-button>

      <!-- Cancel Button -->
      <app-button
        customColor="bg-slate-100 text-[#475569] hover:bg-slate-200 transition-all rounded-xl font-medium"
        size="md"
        type="button"
      >
        Cancel
      </app-button>
    </div>
    </ng-container>
  </form>
</section>
