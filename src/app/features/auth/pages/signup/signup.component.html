<div class="mx-auto flex min-h-screen w-full max-w-2xl items-center px-4 py-6 lg:px-8 lg:py-8">
  <section class="flex w-full items-center">
    <div class="w-full rounded-[28px] border border-slate-200 bg-white p-6 shadow-[0_24px_60px_rgba(15,23,42,0.08)] sm:p-8">
      <div class="mb-8">
        <h1 class="text-3xl font-bold tracking-tight text-[#181F39]">Choose your role</h1>
        <p class="mt-2 text-sm text-slate-500">Select one option to continue.</p>
      </div>

      <div *ngIf="errorMessage" class="mb-5 flex items-start gap-3 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700 animate-fade-in">
        <i class="fa-solid fa-circle-exclamation mt-0.5"></i>
        <span>{{ errorMessage }}</span>
      </div>

      <div class="space-y-4">
        <button
          type="button"
          class="w-full rounded-[22px] border px-5 py-5 text-left transition-all hover:border-[#23A997] hover:bg-[#23A997]/5"
          [ngClass]="role === 'student' ? 'border-[#23A997] bg-[#23A997]/5' : 'border-slate-200 bg-white'"
          (click)="role = 'student'; errorMessage = ''"
        >
          <div class="mb-3 flex h-12 w-12 items-center justify-center rounded-2xl bg-[#23A997]/10 text-[#23A997]">
            <i class="fa-solid fa-graduation-cap"></i>
          </div>
          <p class="text-base font-semibold text-[#181F39]">Student</p>
        </button>

        <button
          type="button"
          class="w-full rounded-[22px] border px-5 py-5 text-left transition-all hover:border-[#23A997] hover:bg-[#23A997]/5"
          [ngClass]="role === 'admin' ? 'border-[#23A997] bg-[#23A997]/5' : 'border-slate-200 bg-white'"
          (click)="role = 'admin'; errorMessage = ''"
        >
          <div class="mb-3 flex h-12 w-12 items-center justify-center rounded-2xl bg-[#23A997]/10 text-[#23A997]">
            <i class="fa-solid fa-building-shield"></i>
          </div>
          <p class="text-base font-semibold text-[#181F39]">Admin</p>
        </button>
      </div>

      <button
        class="mt-6 flex h-14 w-full items-center justify-center rounded-2xl bg-[#23A997] px-4 text-sm font-semibold text-white transition hover:bg-[#1e9585]"
        (click)="selectRole()"
      >
        Continue
      </button>

      <p class="mt-6 text-center text-sm text-slate-500">
        Already have an account?
        <a routerLink="/login" class="font-semibold text-[#0f766e] hover:text-[#0f5d54]">Sign in</a>
      </p>
    </div>
  </section>
</div>
