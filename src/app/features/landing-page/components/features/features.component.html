<section id="features" class="py-24">
  <div class="mx-auto max-w-7xl px-6 lg:px-8">
    <p class="text-center text-sm font-semibold uppercase tracking-[0.22em] text-[#23A997]">Core capabilities</p>
    <app-section-title title="Built for AI-Personalized Learning at Scale" color="dark"></app-section-title>
    <p class="mx-auto mb-12 max-w-3xl text-center text-lg text-slate-600">
      Experience an innovative platform designed for modern educational needs, seamlessly integrating admin oversight, teaching tools, and personalized student engagement.
    </p>

    <div class="grid gap-6 md:grid-cols-2 xl:grid-cols-3">
      <div *ngFor="let feature of features" class="fade-in">
        <app-card type="feature" [equalHeight]="true">
          <div class="mb-5 flex h-12 w-12 items-center justify-center rounded-2xl bg-[#ecf9f6] text-2xl">
            {{ feature.icon }}
          </div>
          <h3 class="text-xl font-semibold text-[#181F39]">
            {{ feature.title }}
          </h3>
          <p class="mt-3 flex-1 text-sm leading-7 text-slate-500">
            {{ feature.description }}
          </p>
        </app-card>
      </div>
    </div>
  </div>
</section>
