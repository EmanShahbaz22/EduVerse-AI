<header
  class="fixed top-0 z-[1000] w-full border-b border-[#e2e8f0] transition-all duration-300"
  [style.background]="'rgba(248, 249, 252, ' + headerOpacity + ')'"
  style="backdrop-filter: blur(14px)">
  <div class="mx-auto max-w-7xl px-6 lg:px-8">
    <nav class="flex items-center justify-between py-4">
      <a href="#" class="flex items-center gap-3">
        <div class="flex h-10 w-10 items-center justify-center rounded-[12px] bg-[#23A997] text-white shadow-sm">
          <i class="fa-solid fa-book-open text-[16px]"></i>
        </div>
        <span class="text-[24px] font-bold tracking-tight text-[#181F39]">Edu<span class="text-[#23A997]">Verse</span></span>
      </a>

      <ul class="hidden items-center gap-8 md:flex">
        <li>
          <a (click)="scrollToSection('platform')" class="cursor-pointer text-sm font-medium text-slate-600 transition-colors hover:text-[#23A997]">
            Platform
          </a>
        </li>
        <li>
          <a (click)="scrollToSection('ai')" class="cursor-pointer text-sm font-medium text-slate-600 transition-colors hover:text-[#23A997]">
            AI Assistant
          </a>
        </li>
        <li>
          <a (click)="scrollToSection('workflow')" class="cursor-pointer text-sm font-medium text-slate-600 transition-colors hover:text-[#23A997]">
            Workflow
          </a>
        </li>
        <li>
          <a (click)="scrollToSection('pricing')" class="cursor-pointer text-sm font-medium text-slate-600 transition-colors hover:text-[#23A997]">
            Pricing
          </a>
        </li>
      </ul>

      <div class="hidden items-center gap-3 md:flex">
        <app-button
          variant="outline"
          size="md"
          (buttonClick)="navigateToLogin()"
          [class]="'rounded-full border-[#dbe4ea] bg-white px-5 text-slate-700 hover:bg-slate-50'">
          Sign In
        </app-button>
        <app-button
          size="md"
          (buttonClick)="navigateToSignup()">
          Get Started
        </app-button>
      </div>

      <button class="flex h-10 w-10 items-center justify-center rounded-xl border border-[#dbe4ea] bg-white text-slate-700 md:hidden"
        (click)="toggleMobileMenu()">
        <i class="fa-solid" [ngClass]="mobileMenuOpen ? 'fa-xmark' : 'fa-bars'"></i>
      </button>
    </nav>

    <div *ngIf="mobileMenuOpen" class="md:hidden pb-4">
      <div class="rounded-[18px] border border-[#e2e8f0] bg-white p-4 shadow-sm">
        <div class="flex flex-col gap-3">
          <a (click)="scrollToSection('platform')" class="cursor-pointer rounded-xl px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">Platform</a>
          <a (click)="scrollToSection('ai')" class="cursor-pointer rounded-xl px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">AI Assistant</a>
          <a (click)="scrollToSection('workflow')" class="cursor-pointer rounded-xl px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">Workflow</a>
          <a (click)="scrollToSection('pricing')" class="cursor-pointer rounded-xl px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">Pricing</a>
          <div class="mt-2 grid gap-2 sm:grid-cols-2">
            <app-button
              variant="outline"
              size="md"
              [fullWidth]="true"
              (buttonClick)="navigateToLogin()"
              [class]="'rounded-full border-[#dbe4ea] bg-white text-slate-700 hover:bg-slate-50'">
              Sign In
            </app-button>
            <app-button
              size="md"
              [fullWidth]="true"
              (buttonClick)="navigateToSignup()">
              Get Started
            </app-button>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
