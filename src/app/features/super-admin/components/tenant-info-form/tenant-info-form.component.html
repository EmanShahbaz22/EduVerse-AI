<section class="bg-white rounded-[14px] shadow-sm border border-[#e2e8f0] p-6">
    <div class="flex items-start justify-between mb-4">
        <h3 class="text-lg font-bold text-[#181F39] flex items-center">
            <i class="fa-solid fa-building mr-2 text-[#23A997]"></i> Tenant Information
        </h3>
    </div>

    <form (ngSubmit)="onSave()" [formGroup]="form" class="space-y-5">
        <div>
            <label class="block text-[14px] font-medium text-[#181F39] mb-3">Tenant Logo</label>
            <div class="flex items-center space-x-4">
                <img
                    [src]="logoPreview || 'assets/images/profile.png'"
                    alt="Tenant Logo"
                    class="h-16 w-16 rounded-full border object-cover"
                />
                <label
                    class="cursor-pointer bg-[#23A997] text-white px-5 py-2.5 rounded-xl shadow-md shadow-[#23A997]/20 hover:bg-[#1f9686] text-[14px] font-medium transition-all"
                >
                    <i class="fas fa-upload mr-2"></i> Upload
                    <input
                        type="file"
                        accept="image/*"
                        (change)="onFileChange($event)"
                        class="hidden"
                    />
                </label>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div class="space-y-1.5">
                <label class="text-sm font-semibold text-[#181F39]">Tenant Name</label>
                <input formControlName="tenantName" class="w-full h-[46px] px-4 border border-[#cbd5e1] rounded-xl focus:outline-none focus:ring-4 focus:ring-[#23A997]/20 focus:border-[#23A997] transition-all" />
            </div>

            <div class="space-y-1.5">
                <label class="text-sm font-semibold text-[#181F39]">Admin Email</label>
                <input formControlName="adminEmail" class="w-full h-[46px] px-4 border border-[#e2e8f0] rounded-xl bg-slate-50 text-gray-400 cursor-not-allowed" />
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div class="space-y-1.5">
                <label class="text-sm font-semibold text-[#181F39]">Contact Number</label>
                <app-phone-input formControlName="contactNumber" [country]="form.get('address')?.value" placeholder="Enter phone number"></app-phone-input>
            </div>

            <div class="space-y-1.5">
                <label class="text-sm font-semibold text-[#181F39]">Country</label>
                <app-country-select
                    formControlName="address"
                    placeholder="Select country"
                ></app-country-select>
            </div>
        </div>

        <!-- Change password accordion -->
        <div class="border-t border-[#e2e8f0] pt-3">
            <app-button
                (buttonClick)="toggleChangePassword()"
                customColor="text-sm text-[#475569] hover:text-[#181F39] flex items-center space-x-2"
            >
                <span>Change Password</span>
                <i class="fas" [ngClass]="showChangePassword ? 'fa-chevron-up' : 'fa-chevron-down' "></i>
            </app-button>

            <div *ngIf="showChangePassword" class="mt-4">
                <app-change-password [isSuperAdmin]="true" (ngSubmit)="onPasswordChanged($event)"></app-change-password>
            </div>
        </div>

        <div class="flex justify-end pt-4 border-t border-[#e2e8f0]">
            <app-button
                customColor="bg-[#23A997] hover:bg-[#1e9585] text-white font-bold px-8 h-[46px] rounded-xl shadow-sm transition-all flex items-center justify-center"
                (buttonClick)="onSave()"
            >
                Save Changes
            </app-button>
        </div>
    </form>
</section>
