<div class="flex flex-col h-full animate-fade-in">
  <app-header pageTitle="Settings"></app-header>
  <main class="p-6">
    <div class="max-w-6xl mx-auto space-y-6">

      <!-- Profile Information -->
      <div *ngIf="!loading" class="bg-white rounded-[14px] shadow-sm border border-[#e2e8f0] p-6">
        <h3 class="text-lg font-bold text-[#181F39] mb-6 flex items-center">
          <i class="fa-solid fa-user-gear text-[#23A997] mr-2"></i> Profile Information
        </h3>

        <form [formGroup]="profileForm" (ngSubmit)="onSave()" class="space-y-5">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <!-- Full Name -->
            <div class="space-y-1.5">
              <label class="text-sm font-semibold text-[#181F39]">Full Name</label>
              <input formControlName="fullName" type="text" placeholder="John Doe"
                class="w-full h-[46px] px-4 border border-[#cbd5e1] rounded-xl focus:outline-none focus:ring-4 focus:ring-[#23A997]/20 focus:border-[#23A997] transition-all placeholder-gray-400">
              <div *ngIf="profileForm.get('fullName')?.invalid && profileForm.get('fullName')?.touched" class="text-red-500 text-xs mt-1">
                Full name is required (min 2 characters).
              </div>
            </div>

            <!-- Email (Disabled) -->
            <div class="space-y-1.5">
              <label class="text-sm font-semibold text-[#181F39]">Email (Read-Only)</label>
              <input formControlName="email" type="email"
                class="w-full h-[46px] px-4 border border-[#e2e8f0] rounded-xl bg-slate-50 text-gray-400 cursor-not-allowed">
            </div>

            <!-- Contact Number -->
            <div class="space-y-1.5">
              <label class="text-sm font-semibold text-[#181F39]">Contact Number</label>
              <app-phone-input formControlName="contactNo" [country]="profileForm.get('country')?.value" placeholder="Enter phone number"></app-phone-input>
            </div>

            <!-- Country -->
            <div class="space-y-1.5">
              <label class="text-sm font-semibold text-[#181F39]">Country</label>
              <app-country-select
                formControlName="country"
                placeholder="Select country"
              ></app-country-select>
            </div>
          </div>

          <div class="flex justify-end pt-4 border-t border-[#e2e8f0]">
            <button type="submit" [disabled]="profileForm.invalid"
              class="bg-[#23A997] hover:bg-[#1e9585] text-white font-bold h-[46px] px-8 rounded-xl shadow-sm transition-all disabled:opacity-50 disabled:cursor-not-allowed focus:ring-4 focus:ring-[#23A997]/20">
              Save Changes
            </button>
          </div>
        </form>
      </div>

      <!-- Change Password -->
      <div *ngIf="!loading">
        <app-change-password [isSuperAdmin]="true"></app-change-password>
      </div>

      <!-- Skeleton loader -->
      <div *ngIf="loading" class="animate-pulse space-y-6">
        <div class="h-64 bg-gray-200 rounded-[14px] w-full"></div>
        <div class="h-48 bg-gray-200 rounded-[14px] w-full"></div>
      </div>

    </div>
  </main>
</div>
