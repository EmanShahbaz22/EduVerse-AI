<div class="transition-all min-h-screen bg-gray-50">
    <app-header pageTitle="Tenant Settings"></app-header>

    <main class="max-w-6xl mx-auto p-6 space-y-6">
        <div *ngIf="loadingTenant" class="rounded-md border border-gray-200 bg-white px-4 py-3 text-sm text-gray-600">
            Loading tenant details...
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- left: tenant info takes 2/3 -->
            <div class="lg:col-span-2 space-y-6">

                <!-- Tenant Info -->
                <app-tenant-info-form [tenant]="tenant" (save)="onSaveTenant($event)"></app-tenant-info-form>

                <app-account-actions (deactivate)="onDeactivate()" (delete)="onDelete()"></app-account-actions>
            </div>

            <!-- right: subscription details -->
            <div>
                <app-subscription-details [subscription]="subscriptionDetails" (upgrade)="onUpgrade()"
                    (renew)="onRenew()"></app-subscription-details>
            </div>
        </div>
    </main>
</div>
