<section class="h-full rounded-[24px] border border-[#dbe4ea] bg-white p-6 shadow-sm">
  <div class="mb-5 flex items-start justify-between gap-4">
    <div>
      <h2 class="text-xl font-bold tracking-tight text-[#181F39]">Pending Deadlines</h2>
      <p class="mt-1 text-sm text-slate-500">Your next quizzes that still need attention.</p>
    </div>
    <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-[#ecf9f6] text-[#23A997]">
      <i class="fa-solid fa-calendar-check text-lg"></i>
    </div>
  </div>

  <div *ngIf="pendingTasks.length === 0" class="rounded-[18px] border border-dashed border-[#dbe4ea] bg-[#f8f9fc] px-4 py-4">
    <div class="flex items-start gap-4">
      <div class="flex h-11 w-11 flex-shrink-0 items-center justify-center rounded-2xl bg-[#ecf9f6] text-[#23A997]">
        <i class="fa-solid fa-check"></i>
      </div>
      <div>
        <p class="font-semibold text-[#181F39]">You're all caught up</p>
        <p class="mt-1 text-sm text-slate-500">No upcoming quizzes are waiting for you right now.</p>
      </div>
    </div>
  </div>

  <div class="space-y-3" *ngIf="pendingTasks.length > 0">
    <button
      *ngFor="let t of pendingTasks"
      type="button"
      class="flex w-full items-start gap-4 rounded-[18px] border border-[#e2e8f0] bg-[#f8f9fc] px-4 py-4 text-left transition-all hover:border-[#c7d6df] hover:bg-white hover:shadow-sm"
      (click)="goToTask(t.route)">
      <div
        class="flex h-11 w-11 flex-shrink-0 items-center justify-center rounded-2xl"
        [ngClass]="[t.iconBgClass, t.iconColorClass]">
        <i [class]="t.icon"></i>
      </div>
      <div class="min-w-0 flex-1">
        <div class="flex items-start justify-between gap-3">
          <div>
            <h4 class="line-clamp-1 font-semibold text-[#181F39]">{{ t.title }}</h4>
            <p class="mt-1 text-sm text-slate-500">{{ t.courseName }}</p>
          </div>
          <span class="rounded-full bg-white px-3 py-1 text-xs font-semibold uppercase tracking-[0.14em] text-slate-500">
            {{ t.dueDate | date: 'MMM d' }}
          </span>
        </div>
      </div>
    </button>
  </div>
</section>
