<section class="rounded-[22px] border border-[#dbe4ea] bg-white p-5 shadow-sm">
  <div class="mb-4">
    <div>
      <h3 class="text-xl font-bold tracking-tight text-[#181F39]">Continue Learning</h3>
      <p class="mt-1 text-sm text-slate-500">Resume the courses where you already have momentum.</p>
    </div>
  </div>

  <div *ngIf="courses.length === 0" class="rounded-[18px] border border-dashed border-[#dbe4ea] bg-[#f8f9fc] px-4 py-4">
    <div class="flex items-start gap-4">
      <div class="flex h-11 w-11 flex-shrink-0 items-center justify-center rounded-2xl bg-slate-100 text-[#181F39]">
        <i class="fa-solid fa-book-open"></i>
      </div>
      <div>
        <p class="font-semibold text-[#181F39]">{{ emptyTitle }}</p>
        <p class="mt-1 text-sm text-slate-500">{{ emptyDescription }}</p>
      </div>
    </div>
  </div>

  <div *ngIf="courses.length > 0" class="grid gap-3 lg:grid-cols-2">
    <div
      *ngFor="let c of courses"
      class="rounded-[18px] border border-[#dbe4ea] bg-[#f8f9fc] px-4 py-3.5">
      <div class="flex items-start gap-3">
        <div class="min-w-0 flex-1">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <p class="truncate font-semibold text-[#181F39]">{{ c.title }}</p>
              <p class="mt-1 truncate text-sm text-slate-500">{{ c.lesson }}</p>
            </div>
            <span class="shrink-0 rounded-full bg-white px-3 py-1 text-xs font-semibold uppercase tracking-[0.14em] text-slate-500">
              {{ c.progress }}%
            </span>
          </div>

          <div class="mt-3 h-2.5 w-full rounded-full bg-slate-200">
            <div
              class="h-2.5 rounded-full bg-[#23A997] transition-all duration-[1400ms] ease-out"
              [style.width.%]="c.progress">
            </div>
          </div>

          <div class="mt-3 flex items-center justify-between gap-3">
            <span class="text-xs font-medium text-slate-500">
              {{ c.progress === 100 ? 'Completed course' : 'Continue from where you left off' }}
            </span>
            <button
              type="button"
              class="inline-flex h-9 shrink-0 items-center gap-2 rounded-full border border-[#dbe4ea] bg-white px-3 text-sm font-semibold text-slate-700 transition-colors hover:border-[#23A997] hover:text-[#23A997]"
              (click)="openCourse(c.id)"
              title="Continue course">
              <i class="fa-solid fa-play text-[11px]"></i>
              <span>{{ c.progress === 100 ? 'Review' : 'Resume' }}</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
