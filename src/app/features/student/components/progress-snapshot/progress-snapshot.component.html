<section class="flex h-full flex-col rounded-[22px] border border-[#dbe4ea] bg-white p-5 shadow-sm">
  <div class="flex items-start justify-between gap-4">
    <div>
      <h3 class="text-xl font-bold tracking-tight text-[#181F39]">Progress Snapshot</h3>
      <p class="mt-1 text-sm text-slate-500">Your overall completion across active learning paths.</p>
    </div>
    <span class="inline-flex items-center rounded-full bg-[#ecf9f6] px-3 py-1 text-sm font-semibold text-[#1b8c7d]">
      {{ progress }}%
    </span>
  </div>

  <div class="mt-6 h-3 w-full rounded-full bg-slate-100">
    <div class="h-3 rounded-full bg-[#23A997] transition-all duration-[1600ms] ease-out" [style.width.%]="progress"></div>
  </div>

  <div class="mt-auto flex items-center justify-between pt-4 text-sm">
    <span class="text-slate-500">Overall Course Completion</span>
    <span class="font-semibold text-[#181F39]">{{ progress }}% complete</span>
  </div>
</section>
