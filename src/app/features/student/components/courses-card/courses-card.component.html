<section class="rounded-[24px] border border-[#dbe4ea] bg-white p-6 shadow-sm">
  <div class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
    <div>
      <h3 class="text-xl font-bold tracking-tight text-[#181F39]">Recommended Courses</h3>
      <p class="mt-1 text-sm text-slate-500">Suggestions based on what you are already studying.</p>
    </div>
    <span class="inline-flex w-fit items-center rounded-full bg-[#ecf9f6] px-3 py-1 text-xs font-semibold uppercase tracking-[0.14em] text-[#1b8c7d]">
      {{ recommendations.length }} suggestions
    </span>
  </div>

  <div *ngIf="recommendations.length === 0" class="rounded-[20px] border border-dashed border-[#dbe4ea] bg-[#f8f9fc] px-5 py-12 text-center">
    <p class="font-semibold text-[#181F39]">No recommendations yet</p>
    <p class="mt-1 text-sm text-slate-500">As you enroll and progress, course suggestions will show up here.</p>
  </div>

  <div *ngIf="recommendations.length > 0" class="grid grid-cols-1 gap-6 md:grid-cols-2 xl:grid-cols-3">
    <button
      *ngFor="let course of recommendations"
      type="button"
      (click)="goToCourse(course.id)"
      class="group flex h-full flex-col overflow-hidden rounded-[22px] border border-[#e2e8f0] bg-white text-left shadow-sm transition-all hover:-translate-y-1 hover:shadow-md">
      <img [src]="course.image" alt="{{ course.title }}" class="h-44 w-full object-cover" />

      <div class="flex flex-1 flex-col p-5">
        <div class="flex items-start justify-between gap-3">
          <h4 class="text-lg font-semibold text-[#181F39]">
            {{ course.title }}
          </h4>
          <span class="rounded-full px-2.5 py-1 text-xs font-semibold" [ngClass]="{
              'bg-[#ecf9f6] text-[#1b8c7d]': course.level === 'Beginner',
              'bg-slate-100 text-slate-600': course.level === 'Intermediate',
              'bg-amber-100 text-amber-700': course.level === 'Advanced'
            }">
            {{ course.level }}
          </span>
        </div>

        <p class="mt-3 line-clamp-3 text-sm leading-6 text-slate-500">
          {{ course.description }}
        </p>

        <div class="mt-auto flex items-center justify-between pt-5 text-sm text-slate-500">
          <span class="font-medium">{{ course.instructor }}</span>
          <span *ngIf="course.duration" class="inline-flex items-center gap-1 rounded-full bg-slate-100 px-2.5 py-1 text-xs font-semibold text-slate-600">
            <i class="fa-regular fa-clock"></i> {{ course.duration }}
          </span>
        </div>
      </div>
    </button>
  </div>
</section>
