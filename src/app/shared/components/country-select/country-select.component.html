<div class="relative w-full">
  <button
    type="button"
    class="flex min-h-[46px] w-full items-center justify-between gap-3 rounded-xl border border-slate-300 bg-white px-4 text-left text-[15px] text-[#181F39] outline-none transition-all hover:border-[#23A997] focus:border-[#23A997] focus:ring-4 focus:ring-[#23A997]/20 disabled:cursor-not-allowed disabled:border-slate-200 disabled:bg-slate-50 disabled:text-slate-400"
    [ngClass]="{
      'text-[#64748b]': !value,
      'border-red-500 ring-4 ring-red-500/10': required && touched && !value
    }"
    [disabled]="disabled"
    (click)="toggleDropdown()"
  >
    <span class="flex items-center gap-2.5 truncate">
      <span *ngIf="selectedFlag" class="text-xl leading-none">{{ selectedFlag }}</span>
      {{ value || placeholder }}
    </span>

    <svg
      class="h-[18px] w-[18px] shrink-0 text-[#64748b] transition-transform duration-200"
      [class.rotate-180]="isOpen"
      viewBox="0 0 20 20"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
    >
      <path
        d="M5 7.5L10 12.5L15 7.5"
        stroke="currentColor"
        stroke-width="1.8"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
  </button>

  <div
    *ngIf="isOpen"
    class="absolute left-0 right-0 top-[calc(100%+8px)] z-[2000] overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-[0_18px_40px_rgba(15,23,42,0.12)]"
  >
    <div class="border-b border-slate-200 p-2.5">
      <input
        #searchInput
        type="text"
        autocomplete="off"
        class="h-[42px] w-full rounded-[10px] border border-slate-300 bg-white px-3 text-sm text-[#181F39] outline-none transition-all placeholder:text-[#64748b] focus:border-[#23A997] focus:ring-4 focus:ring-[#23A997]/15"
        [value]="searchTerm"
        placeholder="Search country"
        (input)="handleSearch($event)"
      />
    </div>

    <div class="max-h-60 overflow-y-auto p-2.5">
      <button
        *ngFor="let country of filteredCountries"
        type="button"
        class="flex w-full items-center gap-2.5 rounded-[10px] border-0 px-3 py-2.5 text-left text-sm text-[#181F39] transition-colors hover:bg-slate-50"
        [ngClass]="{
          'bg-[#23A997]/10 font-semibold text-[#0f766e]': country.name === value
        }"
        (click)="selectCountry(country)"
      >
        <span class="text-lg leading-none">{{ country.flag }}</span>
        {{ country.name }}
      </button>

      <div *ngIf="!filteredCountries.length" class="px-3 py-3 text-center text-sm text-[#64748b]">
        No countries found
      </div>
    </div>
  </div>
</div>
