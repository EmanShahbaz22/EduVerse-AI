<div
  *ngIf="show"
  class="fixed inset-0 z-[100] flex items-center justify-center bg-black/30 p-6 backdrop-blur-[2px]"
  (click)="onOverlayClick($event)"
>
  <div
    class="relative flex max-h-[90vh] w-full max-w-2xl flex-col overflow-hidden rounded-[24px] border border-[#e2e8f0] bg-white shadow-2xl"
    (click)="$event.stopPropagation()"
  >
    <!-- Header -->
    <div
      class="flex items-center justify-between border-b border-[#e2e8f0] px-6 py-5"
    >
      <h2 class="text-xl font-bold text-[#181F39]">{{ title }}</h2>
      <button
        type="button"
        class="text-gray-400 transition-colors hover:text-gray-600"
        (click)="close.emit()"
      >
        <i class="fa-solid fa-xmark text-lg"></i>
      </button>
    </div>

    <!-- Body -->
    <div class="min-h-0 flex-1 overflow-y-auto p-6">
      <ng-content></ng-content>
    </div>

    <!-- Footer (Cancel + Dynamic Button) -->
    <div
      class="flex justify-end gap-3 border-t border-[#e2e8f0] bg-slate-50 px-6 py-4"
    >
      <button
        type="button"
        class="rounded-[12px] border border-[#23A997]/30 bg-white px-6 py-2.5 font-semibold text-[#23A997] transition hover:border-[#23A997] hover:bg-[#23A997]/5"
        (click)="close.emit()"
      >
        Cancel
      </button>

      <button
        type="button"
        [disabled]="!isFormValid"
        class="rounded-[12px] bg-[#23A997] px-8 py-2.5 font-semibold text-white shadow-[0_4px_12px_rgba(35,169,151,0.2)] transition hover:bg-[#1f9686] disabled:cursor-not-allowed disabled:bg-[#23A997]/50 disabled:text-white"
        (click)="submit.emit()"
      >
        {{ actionLabel }}
      </button>
    </div>
  </div>
</div>
