<div class="h-full rounded-[14px] shadow-sm border border-[#e2e8f0] bg-white hover:shadow-md hover:-translate-y-1 p-6 transition-all duration-300 flex flex-col justify-center">
  <div class="flex items-center justify-between gap-4">
    <div class="flex flex-col flex-1">
      <p class="text-[15px] font-medium text-[#64748b] mb-1.5 leading-snug">{{ title }}</p>
      <p class="text-[28px] font-semibold text-[#181F39] leading-none tracking-tight">{{ value }}</p>
    </div>
    <div class="flex-shrink-0 p-3.5 rounded-xl flex items-center justify-center" [ngClass]="iconBgClass">
      <i class="{{ icon }} text-[20px]" [ngClass]="iconColorClass"></i>
    </div>
  </div>
</div>
