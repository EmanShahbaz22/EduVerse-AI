<header class="sticky top-0 z-40 border-b backdrop-blur-md transition-colors duration-300"
  [ngClass]="isDark ? 'bg-[#181F39]/90 border-slate-800' : 'bg-white/80 border-[#e2e8f0]'">
  <div class="flex items-center justify-between gap-3 px-4 py-4 sm:px-6">
    <div class="flex min-w-0 items-center">
      <!-- Add a spacer for mobile so the hamburger doesn't overlap text -->
      <div *ngIf="isMobile" class="mr-2 w-10 shrink-0"></div>
      <h1 class="truncate text-[20px] font-bold tracking-tight sm:text-[24px]" [ngClass]="{'text-white': isDark, 'text-[#181F39]': !isDark}">
        {{ pageTitle }}
      </h1>
    </div>

    <div class="flex shrink-0 items-center space-x-3 sm:space-x-4">
      <div class="flex items-center space-x-2 sm:space-x-3">
        <div class="relative">
          <div *ngIf="!displayProfile.avatar; else avatarImg"
            class="h-10 w-10 rounded-full flex items-center justify-center font-bold text-sm cursor-pointer shadow-sm transition-transform hover:scale-105"
            [ngClass]="isDark ? 'bg-slate-800 text-white' : 'bg-[#23A997] text-white'" (click)="onProfileClick()">
            <span class="text-sm font-bold tracking-wide">
              {{ displayProfile.initials }}
            </span>
          </div>
          <ng-template #avatarImg>
            <img [src]="displayProfile.avatar" [alt]="displayProfile.name"
              class="h-8 w-8 rounded-full object-cover cursor-pointer hover:shadow-md transition-shadow"
              (click)="onProfileClick()" />
          </ng-template>
        </div>

        <span class="hidden max-w-[8rem] truncate text-sm font-semibold transition-colors sm:block cursor-pointer"
          [ngClass]="isDark ? 'text-slate-300 hover:text-white' : 'text-[#181F39] hover:text-[#23A997]'" (click)="onProfileClick()">
          {{ displayProfile.name }}
        </span>
      </div>
    </div>
  </div>
</header>
