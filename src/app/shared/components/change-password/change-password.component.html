<section class="bg-white rounded-[14px] shadow-sm border border-[#e2e8f0] p-8">
  <h2 class="text-2xl font-bold text-[#181F39] tracking-tight mb-6">Change Password</h2>

  <form
    [formGroup]="changePasswordForm"
    (ngSubmit)="onSubmit()"
    class="space-y-6"
  >
    <!-- Old Password (Hidden for Super Admins) -->
    <div *ngIf="!isSuperAdmin">
      <label class="block text-[14px] font-medium text-[#181F39] mb-1.5">
        Old Password
      </label>
      <div class="relative">
        <input
          [type]="showOldPassword ? 'text' : 'password'"
          formControlName="oldPassword"
          placeholder="Enter old password"
          class="mt-1 block w-full h-[46px] rounded-xl border border-[#cbd5e1] px-4 pr-12 text-[#181F39] text-[15px] focus:outline-none focus:ring-4 focus:ring-[#23A997]/20 focus:border-[#23A997] transition-all"
        />
        <button
          type="button"
          (click)="toggleOldPassword()"
          class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 hover:text-[#23A997] transition-colors"
        >
          <i class="fas" [ngClass]="showOldPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
        </button>
      </div>
      <p
        *ngIf="
          changePasswordForm.get('oldPassword')?.touched &&
          changePasswordForm.get('oldPassword')?.invalid
        "
        class="mt-1 text-red-500 text-sm"
      >
        Old password must be at least 6 characters.
      </p>
    </div>

    <!-- New Password -->
    <div>
      <label class="block text-[14px] font-medium text-[#181F39] mb-1.5">
        New Password
      </label>
      <div class="relative">
        <input
          [type]="showNewPassword ? 'text' : 'password'"
          formControlName="password"
          placeholder="Enter new password"
          class="mt-1 block w-full h-[46px] rounded-xl border border-[#cbd5e1] px-4 pr-12 text-[#181F39] text-[15px] focus:outline-none focus:ring-4 focus:ring-[#23A997]/20 focus:border-[#23A997] transition-all"
        />
        <button
          type="button"
          (click)="toggleNewPassword()"
          class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 hover:text-[#23A997] transition-colors"
        >
          <i class="fas" [ngClass]="showNewPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
        </button>
      </div>
    </div>

    <!-- Confirm Password -->
    <div>
      <label class="block text-[14px] font-medium text-[#181F39] mb-1.5">
        Confirm Password
      </label>
      <div class="relative">
        <input
          [type]="showConfirmPassword ? 'text' : 'password'"
          formControlName="confirmPassword"
          placeholder="Confirm password"
          class="mt-1 block w-full h-[46px] rounded-xl border border-[#cbd5e1] px-4 pr-12 text-[#181F39] text-[15px] focus:outline-none focus:ring-4 focus:ring-[#23A997]/20 focus:border-[#23A997] transition-all"
        />
        <button
          type="button"
          (click)="toggleConfirmPassword()"
          class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 hover:text-[#23A997] transition-colors"
        >
          <i class="fas" [ngClass]="showConfirmPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
        </button>
      </div>
      <p
        *ngIf="changePasswordForm.hasError('mismatch') && changePasswordForm.get('confirmPassword')?.touched"
        class="mt-1 text-red-500 text-sm"
      >
        Passwords do not match.
      </p>
    </div>

    <!-- Buttons Row -->
    <div class="pt-4 flex space-x-3 justify-end">
      <app-button
        customColor="bg-[#23A997] text-white hover:bg-[#1f9686] transition-all shadow-md shadow-[#23A997]/20 rounded-xl font-medium"
        size="md"
        type="submit"
      >
        <i class="fa-solid fa-key mr-2"></i>
        Change Password
      </app-button>

      <app-button
        customColor="border border-[#23A997]/30 bg-white text-[#23A997] hover:bg-[#23A997]/5 hover:border-[#23A997] transition-all rounded-xl font-medium"
        size="md"
        type="button"
      >
        Cancel
      </app-button>
    </div>
  </form>
</section>
