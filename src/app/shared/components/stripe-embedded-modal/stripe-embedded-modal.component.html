<div class="fixed inset-0 z-[100] overflow-y-auto bg-gray-900/60 backdrop-blur-sm animate-in fade-in duration-300">
  <div class="flex flex-col items-center justify-start min-h-full pt-10 pb-16 px-4">
    
    <div class="bg-white rounded-[24px] shadow-2xl w-full max-w-xl flex flex-col relative border border-[#e2e8f0] flex-shrink-0">
      
      <!-- Close Button -->
      <button (click)="onCancel()" class="absolute top-4 right-4 w-9 h-9 bg-transparent hover:bg-white/10 text-white/70 hover:text-white rounded-full flex items-center justify-center transition-colors z-50">
        <i class="fa-solid fa-xmark text-lg"></i>
      </button>

      <!-- Header -->
      <div class="p-7 flex items-center bg-[#181F39] relative overflow-hidden rounded-t-[24px]">
          <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent"></div>
          <div class="w-12 h-12 rounded-[14px] bg-white/10 flex flex-shrink-0 items-center justify-center text-white mr-4 border border-white/20 backdrop-blur-sm relative z-10">
              <i class="fa-brands fa-stripe-s text-[24px] drop-shadow-md"></i>
          </div>
          <div class="relative z-10">
              <h2 class="text-[20px] font-bold text-white tracking-tight leading-none mb-1.5">{{ title }}</h2>
              <p class="text-[14px] font-medium text-slate-400">Secure payment powered by Stripe</p>
          </div>
      </div>

      <!-- Stripe Container -->
      <div class="w-full p-6 relative bg-white rounded-b-[24px]">
        
       <!-- Loading overlay -->
       <div *ngIf="loading" class="absolute inset-0 flex flex-col items-center justify-center bg-white/95 backdrop-blur-sm z-20 rounded-b-[24px]">
          <i class="fa-solid fa-spinner animate-spin text-5xl text-[#23A997] mb-5"></i>
          <span class="text-[#181F39] font-semibold tracking-wide text-[16px]">Connecting to Secure Vault...</span>
       </div>

       <!-- Stripe Magic Div -->
       <div #checkoutContainer id="checkout" class="w-full"></div>

       <!-- Error State -->
       <div *ngIf="error" class="p-8 text-center bg-white rounded-2xl border-2 border-red-100 m-2 shadow-sm">
           <i class="fa-solid fa-triangle-exclamation text-4xl text-red-500 mb-4 animate-bounce"></i>
           <h3 class="text-[18px] font-bold text-red-800">{{ error }}</h3>
           <p class="text-red-600 mt-2 text-[14px] font-medium">Please refresh the page or try again later.</p>
           <button (click)="onCancel()" class="mt-6 px-6 py-2.5 bg-red-600 text-white rounded-xl shadow-md shadow-red-600/20 hover:bg-red-700 font-medium transition-colors">Close Form</button>
       </div>
    </div>

  </div>

  </div>
</div>
