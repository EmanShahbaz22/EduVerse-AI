<div
  class="flex flex-col lg:flex-row items-stretch lg:items-center gap-4 p-6 bg-white border border-[#e2e8f0] rounded-[14px] shadow-sm">
  <!-- Search box -->
  <div class="relative flex-1">
    <i class="fa-solid fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400 z-10"></i>
    <input type="text"
      class="w-full pl-11 pr-4 h-[46px] bg-[#f8fafc] border border-[#e2e8f0] rounded-xl focus:outline-none focus:ring-1 focus:ring-[#23A997] focus:bg-white focus:border-[#23A997] transition-all duration-300 font-normal text-[15px] text-[#181F39] placeholder-slate-400"
      [placeholder]="searchPlaceholder" [(ngModel)]="filters['search']"
      (ngModelChange)="updateFilter('search', $event)" />
  </div>

  <!-- Dropdown filters -->
  <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 lg:gap-4" *ngFor="let d of dropdowns">
    <label class="text-[#475569] font-medium text-[14px] tracking-wide whitespace-nowrap">
      {{ d.label }}
    </label>

    <select
      class="px-5 h-[46px] bg-[#f8fafc] border border-[#e2e8f0] rounded-xl focus:outline-none focus:ring-1 focus:ring-[#23A997] focus:bg-white focus:border-[#23A997] text-[#181F39] font-normal text-[15px] cursor-pointer transition-all duration-300 hover:bg-slate-50"
      [(ngModel)]="filters[d.key]" (ngModelChange)="updateFilter(d.key, $event)">
      <option value="" class="font-normal text-[15px]">All</option>
      <option *ngFor="let opt of d.options" [value]="opt" class="font-normal text-[15px]">
        {{ opt }}
      </option>
    </select>
  </div>

  <!-- Reset button -->
  <div class="sm:self-center shrink-0">
    <app-button
      customColor="bg-white border-[#e2e8f0] text-slate-700 font-medium focus:outline-none focus:ring-2 focus:ring-[#23A997]/50 hover:bg-[#23A997]/10 hover:text-[#23A997] border shadow-sm transition-all duration-300 rounded-xl"
      [size]="'md'" (buttonClick)="resetFilters()">
      <i class="fa-solid fa-rotate-right mr-2"></i>
      Reset
    </app-button>
  </div>

  <!-- Header CTA Actions Hook -->
  <div class="toolbar-actions ml-auto w-full lg:w-auto flex items-center justify-end shrink-0 pl-2 border-t lg:border-t-0 lg:border-l border-[#e2e8f0] pt-4 lg:pt-0">
    <ng-content select="[toolbar-actions]"></ng-content>
  </div>
</div>
